version: "3.9"

# ================================================================
# Aigen 双栈生产部署配置
#
# 服务组成:
#   - aigen-java:     Spring Boot 主后端 (端口 8123)
#   - aigen-python:   Python AI 工作流服务 (端口 8100, 内部通讯)
#   - mysql:          MySQL 8 数据库
#   - redis:          Redis 7 (Session + 缓存共享)
#   - nginx:          反向代理 + 静态资源服务
#
# 启动方式:
#   cp .env.example .env    # 填写真实配置
#   docker compose up -d
# ================================================================

services:

  # ----------------------------------------------------------------
  # MySQL 数据库
  # ----------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: aigen-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aigen
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aigen123456}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aigen-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-aigen123456}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Redis (Java Session + Python 缓存共用同一实例)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aigen-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - aigen-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------
  # Python AI 工作流服务
  # 对外不暴露端口，仅通过内部网络供 Java 调用
  # ----------------------------------------------------------------
  aigen-python:
    build:
      context: ./aigen-python-ai
      dockerfile: Dockerfile
    container_name: aigen-python
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: "8100"
      # LLM 配置
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # 图片 API
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      # 服务间认证密钥 (与 Java 端对齐)
      JAVA_CORE_INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      JAVA_CORE_BASE_URL: http://aigen-java:8123/api
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "0"
      # 代码输出目录 (与 Java 端共享卷)
      CODE_OUTPUT_ROOT_DIR: /app/output
    volumes:
      # 代码输出共享卷：Python 写代码 → Java 读代码部署
      - code_output:/app/output
    networks:
      - aigen-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/api/v1/ai/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # Java Spring Boot 主后端
  # ----------------------------------------------------------------
  aigen-java:
    build:
      context: ./aiegn-java-core
      dockerfile: Dockerfile.java
    container_name: aigen-java
    restart: unless-stopped
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aigen?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aigen123456}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Python AI 服务
      PYTHON_AI_SERVICE_URL: http://aigen-python:8100
      JAVA_CORE_INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      # COS 对象存储
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}
    volumes:
      # 共享代码输出卷 (同 Python 端)
      - code_output:/app/output
      - deploy_output:/app/deploy
    networks:
      - aigen-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      aigen-python:
        condition: service_healthy
    ports:
      # 仅暴露给 Nginx，不直接对外
      - "127.0.0.1:8123:8123"

  # ----------------------------------------------------------------
  # Nginx 反向代理
  # 负责: API 转发 + 静态部署文件服务 + HTTPS (可选)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: aigen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - deploy_output:/usr/share/nginx/html/deploy:ro
      - nginx_logs:/var/log/nginx
      # HTTPS 证书挂载（可选）
      # - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - aigen-net
    depends_on:
      - aigen-java

# ================================================================
# 网络 & 卷
# ================================================================
networks:
  aigen-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  code_output:
    # Python 生成代码 & Java 部署读取共享卷
    driver: local
  deploy_output:
    # Java 部署产物 & Nginx 静态文件共享卷
    driver: local
  nginx_logs:
    driver: local
