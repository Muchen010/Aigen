server {
    listen 80;
    server_name _;

    # ----------------------------------------------------------------
    # API 转发 → Java 后端
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://aigen-java:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应必须的配置（禁用 Nginx 缓冲）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # ----------------------------------------------------------------
    # 已部署的用户应用（静态文件）
    # URL 格式: /deploy/{deployKey}/
    # 对应 Java: AppConstant.CODE_DEPLOY_HOST + deployKey
    # ----------------------------------------------------------------
    location /deploy/ {
        alias /usr/share/nginx/html/deploy/;
        try_files $uri $uri/ /deploy/$1/index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ----------------------------------------------------------------
    # 前端静态资源（如果有单独的前端构建产物）
    # ----------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1d;
    }
}
